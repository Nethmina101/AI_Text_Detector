<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybrid AI Text Detector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="ambient-light"></div>

  <div class="glass-container main-card">
    <header class="header">
      <div class="logo-icon">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
          stroke-linejoin="round">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
          </path>
          <polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline>
          <polyline points="7.5 19.79 7.5 14.6 3 12"></polyline>
          <polyline points="21 12 16.5 14.6 16.5 19.79"></polyline>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <h1>AI Document Analyzer </h1>
      <p class="subtitle">Analyze your text to determine if it was written by an AI or a Human</p>
    </header>

    <form action="/analyze" method="post" enctype="multipart/form-data" class="upload-form" id="analyzeForm">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="toast-container">
        {% for category, message in messages %}
        <div class="toast toast-{{ category }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span>{{ message }}</span>
          <button type="button" class="toast-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      <div class="tabs">
        <button type="button" class="tab active" onclick="switchTab('text')" id="btn-tab-text">Paste Text</button>
        <button type="button" class="tab" onclick="switchTab('file')" id="btn-tab-file">Upload File</button>
      </div>

      <div id="tab-text" class="tab-content active">
        <div class="input-group">
          <textarea name="text_input" placeholder="Paste your essay, article, or text here to analyze..."></textarea>
        </div>
      </div>

      <div id="tab-file" class="tab-content">
        <div class="file-upload-wrapper">
          <label class="file-upload-border">
            <svg class="upload-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Drag & drop a file or <span class="browse">browse</span></p>
            <span class="file-hint">Supports .pdf, .docx, .txt</span>
            <input type="file" name="file" accept=".pdf,.docx,.txt" class="file-input" id="fileInput"
              onchange="updateFileName(this)" />
          </label>
          <div style="text-align: center;">
            <p id="fileNameDisplay" class="file-name-display" style="display: none;"></p>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Analyze Content</span>
        <svg class="loader" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="12" r="10" fill="none" stroke-width="3" stroke-dasharray="62" stroke-dashoffset="31">
          </circle>
        </svg>
      </button>
    </form>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      document.getElementById('btn-tab-' + tabId).classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    function updateFileName(input) {
      const display = document.getElementById('fileNameDisplay');
      if (input.files && input.files.length > 0) {
        display.textContent = "Selected: " + input.files[0].name;
        display.style.display = 'inline-block';
        setTimeout(() => display.style.opacity = 1, 10);
      } else {
        display.style.opacity = 0;
        setTimeout(() => display.style.display = 'none', 300);
      }
    }

    document.getElementById('analyzeForm').addEventListener('submit', function () {
      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      document.querySelector('.btn-text').textContent = "Analyzing...";
    });

    // Auto-dismiss toasts
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        document.querySelectorAll('.toast').forEach(toast => {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(-10px)';
          toast.style.transition = 'all 0.3s ease';
          setTimeout(() => toast.remove(), 300);
        });
      }, 5000);
    });
  </script>
</body>

</html>
